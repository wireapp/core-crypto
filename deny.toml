[graph]
targets = [
  # Desktop
  { triple = "x86_64-unknown-linux-gnu" },
  { triple = "aarch64-unknown-linux-gnu" },
  { triple = "x86_64-unknown-linux-musl" },
  { triple = "aarch64-apple-darwin" },
  { triple = "x86_64-pc-windows-msvc" },
  # WASM
  { triple = "wasm32-unknown-unknown" },
  # iOS
  { triple = "aarch64-apple-ios-sim" },
  { triple = "aarch64-apple-ios" },
  # Android
  { triple = "aarch64-linux-android" },
  { triple = "armv7-linux-androideabi" },
  { triple = "x86_64-linux-android" },
]

[advisories]
version = 2

# Fail if ignored advisories don't exist (anymore).
unused-ignored-advisory = "deny"

ignore = [
  # `paste` is no longer maintained and its repo is archived,
  # however `uniffi` still depends on it.
  "RUSTSEC-2024-0436",
  # The fix at https://github.com/RustCrypto/RSA/pull/394 is merged,
  # and will be in rsa v0.10, once that comes out of the eternal
  # pre-release state. We need to update it via our rusty-jwt-simple.
  "RUSTSEC-2023-0071",
  # This advisory is about unsoundness of rand versions >= `0.7`, < `0.9.3` and `0.10.0`.
  # However, it's only relevant if the "log" feature is enabled and a custom logger is used, which is not the case in
  # this project.
  #
  # See https://github.com/rust-random/rand/pull/1763.
  "RUSTSEC-2026-0097",
]

[bans]
multiple-versions = "allow"

[licenses]
version = 2
allow = [
  "Apache-2.0",
  "MIT",
  "MPL-2.0",
  "GPL-3.0",
  "GPL-3.0-only",
  "BSD-3-Clause",
  "Apache-2.0 WITH LLVM-exception",
  "ISC",
  "Zlib",
  "Unicode-3.0",
]

[[licenses.clarify]]
name = "pkiprocmacros"
expression = "Apache-2.0 OR MIT"
license-files = []

[sources]
unknown-git = "deny"
unknown-registry = "deny"
allow-git = ["https://github.com/rust-db/refinery"]

[sources.allow-org]
github = ["wireapp"]
