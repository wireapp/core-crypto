concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}-docs-cc-book"
  cancel-in-progress: true

on:
  workflow_call:

jobs:
  docs-cc-book:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: install mdbook and mdbook-langtabs
        run: |
          mkdir -p "$HOME/.local/bin"
          curl -sSL "https://github.com/rust-lang/mdBook/releases/download/v0.5.2/mdbook-v0.5.2-x86_64-unknown-linux-gnu.tar.gz" \
            | tar -xz -C "$HOME/.local/bin"
          curl -sSL "https://github.com/nx10/mdbook-langtabs/releases/download/v0.2.0/mdbook-langtabs-x86_64-unknown-linux-gnu.tar.gz" \
            | tar -xz -C "$HOME/.local/bin"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - run: mdbook build cc-book

      - uses: actions/upload-artifact@v7.0.1
        with:
          name: cc-book
          path: cc-book/book
          retention-days: 1
          overwrite: true
          include-hidden-files: true
          if-no-files-found: error
