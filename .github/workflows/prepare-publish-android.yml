name: prepare to publish android packages

concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}-prepare-publish-android"

on:
  workflow_call:
    secrets:
      SONATYPE_USERNAME:
        required: true
      SONATYPE_PASSWORD:
        required: true
      PGP_KEY_ID:
        required: true
      PGP_SIGNING_KEY:
        required: true
      PGP_PASSPHRASE:
        required: true
    outputs:
      staging_repository_id:
        description: "The Sonatype staging repository id created during the prepare phase."
        value: ${{ jobs.android.outputs.staging_repository_id }}

env:
  RELEASE: 1

jobs:
  android:
    if: github.repository == 'wireapp/core-crypto'
    runs-on: ubuntu-latest
    outputs:
      staging_repository_id: ${{ steps.stage.outputs.staging_repository_id }}
    steps:
      - uses: actions/checkout@v7.0.0
      - name: set up jdk 25
        uses: actions/setup-java@v5.5.0
        with:
          java-version: 25
          distribution: adopt

      - name: gradle setup
        uses: gradle/actions/setup-gradle@v6.2.0
        with:
          cache-provider: basic

      - name: validate gradle wrapper
        uses: gradle/actions/wrapper-validation@v6.2.0

      - name: setup android sdk
        uses: android-actions/setup-android@v4

      - name: download android package
        uses: ./.github/actions/make/android/package
        with:
          gh-token: ${{ secrets.GITHUB_TOKEN }}
          artifact-generation: ${{ vars.ARTIFACT_GENERATION }}

      - name: stage artifact in sonatype
        id: stage
        uses: ./.github/actions/sonatype/stage
        with:
          project: ":android"
          label: Android
          sonatype-username: ${{ secrets.SONATYPE_USERNAME }}
          sonatype-password: ${{ secrets.SONATYPE_PASSWORD }}
          pgp-key-id: ${{ secrets.PGP_KEY_ID }}
          pgp-signing-key: ${{ secrets.PGP_SIGNING_KEY }}
          pgp-passphrase: ${{ secrets.PGP_PASSPHRASE }}
