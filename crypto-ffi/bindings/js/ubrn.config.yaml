rust:
  directory: ../../
  manifestPath: Cargo.toml

web:
  rustflags: ["--cfg", 'getrandom_backend="wasm_js"', '-Awarnings']
  ts: packages/browser/src/autogenerated
  wasmCrateName: core-crypto-ffi-wasm
  features: ["wasm"]
  cargoExtras: ["--locked"]

nodejs:
  features: ["napi"]

bindings:
  uniffiToml: ../../uniffi.toml
