name: publish jvm packages

concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}-publish-jvm"

on:
  workflow_call:
    secrets:
      SONATYPE_USERNAME:
        required: true
      SONATYPE_PASSWORD:
        required: true
      PGP_KEY_ID:
        required: true
      PGP_SIGNING_KEY:
        required: true
      PGP_PASSPHRASE:
        required: true
    inputs:
        staging_repository_id:
          description: "Sonatype staging repository id to release, as emitted by the prepare phase."
          required: true
          type: string

env:
  RELEASE: 1

jobs:
  jvm:
    if: github.repository == 'wireapp/core-crypto'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
      - name: set up jdk 25
        uses: actions/setup-java@v5.3.0
        with:
          java-version: 25
          distribution: adopt

      - name: gradle setup
        uses: gradle/actions/setup-gradle@v6.1.1
        with:
          cache-provider: basic

      - name: validate gradle wrapper
        uses: gradle/actions/wrapper-validation@v6.1.1

      - name: release artifact
        run: |
          cd crypto-ffi/bindings
          ./gradlew releaseSonatypeStagingRepository --staging-repository-id="$STAGING_REPOSITORY_ID" --no-configuration-cache
        env:
          STAGING_REPOSITORY_ID: ${{ inputs.staging_repository_id }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.SONATYPE_PASSWORD }}
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.SONATYPE_USERNAME }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyId: ${{ secrets.PGP_KEY_ID }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.PGP_SIGNING_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.PGP_PASSPHRASE }}
