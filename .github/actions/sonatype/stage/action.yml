name: Stage artifact in Sonatype
description: Publish a Gradle project's publications to a Sonatype staging repository, close it, and
  return the created staging repository id.

inputs:
  project:
    description: The Gradle project path to publish, e.g. ':jvm', ':android', ':core-crypto-kmp'.
    required: true
  label:
    description: Human-readable label used in the staging repository notice, e.g. 'JVM'.
    required: true
  sonatype-username:
    required: true
  sonatype-password:
    required: true
  pgp-key-id:
    required: true
  pgp-signing-key:
    required: true
  pgp-passphrase:
    required: true

outputs:
  staging_repository_id:
    description: The Sonatype staging repository id created and closed during this step.
    value: ${{ steps.stage.outputs.staging_repository_id }}

runs:
  using: composite
  steps:
    - name: stage artifact in sonatype
      id: stage
      shell: bash
      working-directory: crypto-ffi/bindings
      run: |
        set -o pipefail
        ./gradlew ${{ inputs.project }}:publishAllPublicationsToSonatypeRepository closeSonatypeStagingRepository --no-configuration-cache | tee gradle-stage.log

        # Scraping the log for the staging repository id isn't ideal, but technically should work, as
        # long as the log string never changes. But we should keep an eye on it. Currently:
        # https://github.com/gradle-nexus/publish-plugin/blob/c550fe9a15d177bad06b7902af9e497f837b6579/src/main/kotlin/io/github/gradlenexus/publishplugin/InitializeNexusStagingRepository.kt#L47
        repo_id=$(sed -n "s/.*Created staging repository '\([^']*\)'.*/\1/p" gradle-stage.log | head -n1)
        if [[ -z "$repo_id" ]]; then
          echo "::error ::Could not determine the staging repository id from the Gradle output"
          exit 1
        fi
        echo "::notice title=${{ inputs.label }} staging repository::Created and closed staging repository ${repo_id}"
        echo "staging_repository_id=${repo_id}" >> "$GITHUB_OUTPUT"
      env:
        ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ inputs.sonatype-password }}
        ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ inputs.sonatype-username }}
        ORG_GRADLE_PROJECT_signingInMemoryKeyId: ${{ inputs.pgp-key-id }}
        ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ inputs.pgp-signing-key }}
        ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ inputs.pgp-passphrase }}
