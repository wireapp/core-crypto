name: publish node packages

concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}-publish-npm"

permissions:
  id-token: write
  contents: write

on:
  workflow_call:
    inputs:
        prepare:
          description: "If true, stage and validate artifacts."
          required: false
          type: boolean
          default: false
        release:
          description: "If true, release staged artifacts."
          required: false
          type: boolean
          default: false
env:
  RELEASE: 1

jobs:
  publish:
    if: github.repository == 'wireapp/core-crypto'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node for npm publish
        uses: actions/setup-node@v6

      - run: sudo npm install -g npm@latest
      - run: echo ::notice ::npm version "$(npm --version)"

      - name: download ts browser artifacts
        if: ${{ inputs.prepare == true }}
        uses: ./.github/actions/make/ts/browser
        with:
          gh-token: ${{ secrets.GITHUB_TOKEN }}
          artifact-generation: ${{ vars.ARTIFACT_GENERATION }}

      - name: download ts native linux artifacts
        if: ${{ inputs.prepare == true }}
        uses: ./.github/actions/make/ts/native
        with:
          gh-token: ${{ secrets.GITHUB_TOKEN }}
          artifact-generation: ${{ vars.ARTIFACT_GENERATION }}

      # We're just using the make action to download the previously produced artifact.
      - name: download ts native aarch64 apple darwin artifacts
        if: ${{ inputs.prepare == true }}
        uses: ./.github/actions/make
        with:
          key: ts-native-darwin-arm64
          make-rule: ts-native
          target-path: |
            crypto-ffi/bindings/js/packages/core-crypto/dist/native/libcore_crypto_ffi.dylib
          gh-token: ${{ secrets.GITHUB_TOKEN }}
          artifact-generation: ${{ vars.ARTIFACT_GENERATION }}

      - name: package tarball
        if: ${{ inputs.prepare == true }}
        id: package
        run: |
          filename=$(make ts-package | tail -n 1)
          echo "filename=$filename" >> "$GITHUB_OUTPUT"
          echo "path=crypto-ffi/bindings/js/packages/core-crypto/$filename" >> "$GITHUB_OUTPUT"

      - name: upload artifacts
        if: ${{ inputs.prepare == true }}
        uses: softprops/action-gh-release@v3
        with:
          files: "${{ steps.package.outputs.path }}"
          fail_on_unmatched_files: true

      - name: download artifacts
        id: download
        if: ${{ inputs.prepare == false && inputs.release == true }}
        run: |
          cd crypto-ffi/bindings/js/packages/core-crypto
          gh release download "${{ github.ref_name }}" --pattern "*.tgz" --dir . 2>/dev/null || true
          filename=$(ls *.tgz 2>/dev/null | head -n 1)
          if [[ -z "$filename" ]]; then
            echo "::error ::No npm tarball found in release '${{ github.ref_name }}'"
            exit 1
          else
            echo "filename=$filename" >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - name: resolve tarball filename
        id: tarball
        if: ${{ inputs.release == true }}
        run: |
          # the output from each step which didn't run is the empty string, and only one of those
          # two steps will ever run, so simple concatenation should suffice here
          echo "filename=${{ steps.package.outputs.filename || steps.download.outputs.filename }}" >> "$GITHUB_OUTPUT"

      - name: publish package to npm (Trusted Publishers)
        if: ${{ inputs.release == true }}
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: |
          # This step should only run on a release, which implies the ref_name
          # is a release tag, not a branch name.
          #
          # If the git tag is a semver prerelease (e.g. `v10.0.0-pre.9`),
          # publish under an npm dist-tag named after the prerelease label
          # (e.g. `pre`) so it doesn't claim `latest`, which npm would reject.
          #
          # A final release (e.g. `v10.0.0`) gets npm's default `latest` tag.
          #
          # Note: we can't use the full git tag as the dist-tag because npm
          # rejects dist-tags that parse as a valid semver version.
          tag='latest'
          if [[ "$GITHUB_REF_NAME" == v*-* ]]; then
            label="${GITHUB_REF_NAME#*-}"   # e.g. `pre.9`
            tag="${label%%.*}"              # e.g. `pre`
            echo "::notice ::publishing prerelease '$GITHUB_REF_NAME' under npm dist-tag '$tag'"
          fi
          cd crypto-ffi/bindings/js/packages/core-crypto
          npm publish "./${{ steps.tarball.outputs.filename }}" --provenance --tag "$tag"

      - name: delete package from gh release
        if: ${{ inputs.release == true }}
        run: gh release delete-asset $GITHUB_REF_NAME "${{ steps.tarball.outputs.filename }}" --yes
        env:
          GH_TOKEN: ${{ github.token }}
