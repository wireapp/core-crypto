name: Fetch or make the ffi lib for jvm
inputs:
  gh-token:
    required: true
  artifact-generation:
    description: suffix for artifact names that allows us to easily invalidate artifacts

runs:
  using: composite

  steps:
      - name: get platform specifics
        id: platform-specs
        run: |
          os="$(uname -s)"
          if [ "$os" = "Linux" ]; then
            library_extension="so"
            target="x86_64-unknown-linux-gnu"
            rule="jvm-linux"
          elif [ "$os" = "Darwin" ]; then
            library_extension="dylib"
            target="aarch64-apple-darwin"
            rule="jvm-darwin"
          fi
          # The jvm-darwin/jvm-linux make rules build both a dynamic library (dylib/so) and a
          # static library (.a); upload both so consumers that link statically can use the .a.
          {
            echo "target-path<<EOF"
            echo "target/${target}/release/libcore_crypto_ffi.${library_extension}"
            echo "target/${target}/release/libcore_crypto_ffi.a"
            echo "EOF"
          } >> $GITHUB_OUTPUT
          echo "rule=${rule}" >> $GITHUB_OUTPUT
          echo "target=${target}" >> $GITHUB_OUTPUT
        shell: bash -euo pipefail {0}
      - uses: ./.github/actions/make
        with:
          key: ${{ steps.platform-specs.outputs.rule }}
          make-rule: ${{ steps.platform-specs.outputs.rule }}
          target-path: ${{ steps.platform-specs.outputs.target-path }}
          gh-token: ${{ inputs.gh-token }}
          uses-rust: true
          rust-target: ${{ steps.platform-specs.outputs.target }}
          artifact-generation: ${{ inputs.artifact-generation }}
