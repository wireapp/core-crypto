name: prepare publish

on:
  workflow_call:
    outputs:
      jvm_staging_repository_id:
        description: "Sonatype staging repository id staged for the jvm packages."
        value: ${{ jobs.jvm.outputs.staging_repository_id }}
      android_staging_repository_id:
        description: "Sonatype staging repository id staged for the android packages."
        value: ${{ jobs.android.outputs.staging_repository_id }}
      kmp_staging_repository_id:
        description: "Sonatype staging repository id staged for the kmp packages."
        value: ${{ jobs.kmp.outputs.staging_repository_id }}
    secrets:
      SONATYPE_USERNAME:
        required: true
      SONATYPE_PASSWORD:
        required: true
      PGP_KEY_ID:
        required: true
      PGP_SIGNING_KEY:
        required: true
      PGP_PASSPHRASE:
        required: true

env:
  RELEASE: 1

jobs:
  verify-tag:
    runs-on: ubuntu-latest
    outputs:
      tag_name: ${{ steps.set-tag.outputs.tag_name }}
    steps:
      - uses: actions/checkout@v7.0.0

      - name: Set tag name
        id: set-tag
        run: echo "tag_name=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Force fetch the tag
        run: git fetch -f origin ${{ github.ref }}:${{ github.ref }}

      - name: Ensure the tag is signed
        run: |
          TAG_NAME=${GITHUB_REF#refs/tags/}
          if ! git cat-file tag "$TAG_NAME" | grep -q -- '-----BEGIN PGP SIGNATURE-----'; then
            echo "Tag $TAG_NAME is not signed!"
            exit 1
          fi

      - name: Ensure the tag name matches all package versions to publish
        run: |
          TAG_NAME=${GITHUB_REF#refs/tags/}
          EXPECTED_VERSION=${TAG_NAME#v}

          if [[ "$TAG_NAME" != v* || -z "$EXPECTED_VERSION" ]]; then
            echo "Release tag '$TAG_NAME' must have the form v<version>"
            exit 1
          fi

          CARGO_VERSION=$(sed -n 's/^version = "\([^"]*\)"/\1/p' crypto-ffi/Cargo.toml)
          GRADLE_VERSION=$(sed -n 's/^VERSION_NAME=//p' crypto-ffi/bindings/gradle.properties)
          NPM_VERSION=$(jq -er '.version' crypto-ffi/bindings/js/packages/core-crypto/package.json)

          exitcode=0

          if [[ "$CARGO_VERSION" != "$EXPECTED_VERSION" ]]; then
            echo "Cargo package core-crypto-ffi version '$CARGO_VERSION' does not match release tag '$TAG_NAME'"
            exitcode=1
          fi

          if [[ "$GRADLE_VERSION" != "$EXPECTED_VERSION" ]]; then
            echo "Gradle packages version '$GRADLE_VERSION' does not match release tag '$TAG_NAME'"
            exitcode=1
          fi

          if [[ "$NPM_VERSION" != "$EXPECTED_VERSION" ]]; then
            echo "npm package @wireapp/core-crypto version '$NPM_VERSION' does not match release tag '$TAG_NAME'"
            exitcode=1
          fi

          exit "$exitcode"

  jvm:
    needs: verify-tag
    uses: ./.github/workflows/prepare-publish-jvm.yml
    secrets:
      SONATYPE_USERNAME: ${{ secrets.SONATYPE_USERNAME }}
      SONATYPE_PASSWORD: ${{ secrets.SONATYPE_PASSWORD }}
      PGP_KEY_ID: ${{ secrets.PGP_KEY_ID }}
      PGP_SIGNING_KEY: ${{ secrets.PGP_SIGNING_KEY }}
      PGP_PASSPHRASE: ${{ secrets.PGP_PASSPHRASE }}

  android:
    needs: verify-tag
    uses: ./.github/workflows/prepare-publish-android.yml
    secrets:
      SONATYPE_USERNAME: ${{ secrets.SONATYPE_USERNAME }}
      SONATYPE_PASSWORD: ${{ secrets.SONATYPE_PASSWORD }}
      PGP_KEY_ID: ${{ secrets.PGP_KEY_ID }}
      PGP_SIGNING_KEY: ${{ secrets.PGP_SIGNING_KEY }}
      PGP_PASSPHRASE: ${{ secrets.PGP_PASSPHRASE }}

  kmp:
    needs: verify-tag
    uses: ./.github/workflows/prepare-publish-kmp.yml
    secrets:
      SONATYPE_USERNAME: ${{ secrets.SONATYPE_USERNAME }}
      SONATYPE_PASSWORD: ${{ secrets.SONATYPE_PASSWORD }}
      PGP_KEY_ID: ${{ secrets.PGP_KEY_ID }}
      PGP_SIGNING_KEY: ${{ secrets.PGP_SIGNING_KEY }}
      PGP_PASSPHRASE: ${{ secrets.PGP_PASSPHRASE }}

  ts:
    needs: verify-tag
    uses: ./.github/workflows/publish-npm.yml
    with:
      prepare: true
