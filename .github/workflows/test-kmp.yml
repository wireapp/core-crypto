concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}-test-kmp-jvm"
  cancel-in-progress: true

on:
  workflow_call:
  workflow_dispatch:

env:
  RELEASE: 1

jobs:
  test-jvm:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - name: set up jdk 25
        uses: actions/setup-java@v5
        with:
          java-version: 25
          distribution: adopt
      - name: gradle setup
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-provider: basic
      - name: validate gradle wrapper
        uses: gradle/actions/wrapper-validation@v6

      - name: download ffi library
        uses: ./.github/actions/make/ffi-library
        with:
          gh-token: ${{ secrets.GITHUB_TOKEN }}
          artifact-generation: ${{ vars.ARTIFACT_GENERATION }}

      - name: download linux library
        uses: ./.github/actions/make/jvm
        with:
          gh-token: ${{ secrets.GITHUB_TOKEN }}
          artifact-generation: ${{ vars.ARTIFACT_GENERATION }}

      - name: build and test kmp package
        uses: ./.github/actions/make
        with:
          key: kmp-jvm-test
          make-rule: kmp-jvm-test
          always-run: ${{ github.event_name == 'workflow_dispatch' || github.ref_name == 'main' }}
          gh-token: ${{ secrets.GITHUB_TOKEN }}
          artifact-generation: ${{ vars.ARTIFACT_GENERATION }}
