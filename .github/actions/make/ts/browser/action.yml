name: Fetch or make the web bindings files and wrappers
inputs:
  gh-token:
    required: true
  artifact-generation:
    description: suffix for artifact names that allows us to easily invalidate artifacts
    required: true

runs:
  using: composite

  steps:
      - name: Set MAKE
        uses: ./.github/actions/make/set-make-executable

      - name: Install wasm-bindgen-cli
        uses: ./.github/actions/setup-wasm-bindgen

      # wasm-opt (binaryen) is invoked by the `wasm-build` make rule in release builds to
      # shrink the shipped wasm. taiki-e/install-action doesn't package binaryen, so we fetch
      # a pinned release tarball directly. Only release builds (RELEASE set) run wasm-opt, so we
      # skip the download otherwise. We extract into RUNNER_TEMP rather than the working tree
      # to avoid perturbing the mtime-sensitive make artifact system.
      - name: Install wasm-opt (binaryen)
        if: ${{ env.RELEASE != '' }}
        shell: bash -euo pipefail {0}
        env:
          BINARYEN_VERSION: version_130
          GH_TOKEN: ${{ inputs.gh-token }}
        run: |
          tarball="binaryen-${BINARYEN_VERSION}-x86_64-linux.tar.gz"
          cd "$RUNNER_TEMP"
          gh release download "${BINARYEN_VERSION}" --repo WebAssembly/binaryen \
            --pattern "${tarball}" --pattern "${tarball}.sha256"
          sha256sum -c "${tarball}.sha256"
          tar -xzf "${tarball}"
          echo "${RUNNER_TEMP}/binaryen-${BINARYEN_VERSION}/bin" >> "$GITHUB_PATH"

      # ensure bun deps are installed freshly before any command using bun is invoked
      - name: install bun deps
        run: |
          $MAKE bun-deps
        shell: bash -euo pipefail {0}

      - name: build wasm
        uses: ./.github/actions/make
        with:
          key: wasm-build
          make-rule:  wasm-build
          target-path: |
            crypto-ffi/bindings/js/packages/browser/src/autogenerated/core_crypto_ffi.ts
            crypto-ffi/bindings/js/packages/browser/src/autogenerated/core_crypto_ffi-ffi.ts
            crypto-ffi/bindings/js/packages/browser/src/autogenerated/wasm-bindgen/index_bg.wasm.d.ts
            crypto-ffi/bindings/js/packages/browser/src/autogenerated/wasm-bindgen/index_bg.wasm
            crypto-ffi/bindings/js/packages/browser/src/autogenerated/wasm-bindgen/index.js
            crypto-ffi/bindings/js/packages/browser/src/autogenerated/wasm-bindgen/index.d.ts
          gh-token: ${{ inputs.gh-token }}
          uses-rust: true
          rust-target: wasm32-unknown-unknown
          artifact-generation: ${{ inputs.artifact-generation }}

      - name: transpile js to ts
        uses: ./.github/actions/make
        with:
          key: ts-browser
          make-rule: ts-browser
          target-path: |
            crypto-ffi/bindings/js/packages/core-crypto/dist/browser/corecrypto.d.ts
            crypto-ffi/bindings/js/packages/core-crypto/dist/browser/corecrypto.js
            crypto-ffi/bindings/js/packages/core-crypto/dist/browser/autogenerated/wasm-bindgen/index_bg.wasm
            crypto-ffi/bindings/js/packages/core-crypto/dist/browser/autogenerated/wasm-bindgen/index_bg.wasm.d.ts
          gh-token: ${{ inputs.gh-token }}
          artifact-generation: ${{ inputs.artifact-generation }}
