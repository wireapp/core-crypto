name: Fetch or make swift bindings
inputs:
  gh-token:
    required: true
  artifact-generation:
    description: suffix for artifact names that allows us to easily invalidate artifacts

runs:
  using: composite

  steps:
      - name: fetch uniffi bindgen artifact
        uses: ./.github/actions/make/uniffi-bindgen
        with:
          gh-token: ${{ inputs.gh-token }}
          artifact-generation: ${{ inputs.artifact-generation }}

      - name: fetch or make Swift FFI library
        uses: ./.github/actions/make
        with:
          key: swift-ffi-library
          make-rule: swift-ffi-library
          target-path: target/swift-bindgen/release/libcore_crypto_ffi.dylib
          gh-token: ${{ inputs.gh-token }}
          uses-rust: true
          artifact-generation: ${{ inputs.artifact-generation }}

      - uses: ./.github/actions/make
        with:
          key: bindings-swift
          make-rule: bindings-swift
          target-path: crypto-ffi/bindings/swift/WireCoreCryptoUniffi/WireCoreCryptoUniffi
          gh-token: ${{ inputs.gh-token }}
          uses-rust: true
          artifact-generation: ${{ inputs.artifact-generation }}

      - uses: ./.github/actions/make
        with:
          key: swift-generate-wrapper
          make-rule: swift-generate-wrapper
          target-path: crypto-ffi/bindings/swift/WireCoreCrypto/WireCoreCrypto
          gh-token: ${{ inputs.gh-token }}
          uses-rust: false
          artifact-generation: ${{ inputs.artifact-generation }}
