version: 2
updates:
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "daily"
    open-pull-requests-limit: 30
    cooldown:
      default-days: 7
  - package-ecosystem: "bun"
    directory: "crypto-ffi/bindings/js"
    schedule:
      interval: "daily"
    groups:
      js-dependencies:
        patterns:
          - "*"
    cooldown:
      default-days: 7
  - package-ecosystem: "github-actions"
    directories: # actions have to be listed explicitly
      - "/" # workflows
      - "/.github/actions/**"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7
  - package-ecosystem: "rust-toolchain"
    directory: /
    schedule:
      interval: "monthly"
    cooldown:
      default-days: 7
