name: toml

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: uncenter/setup-taplo@v2
      - name: setup fd
        uses: taiki-e/install-action@v2
        with:
          tool: fd-find
      - run: fd --glob --hidden '*.toml' -X taplo fmt --check
